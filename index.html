<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Motor DCO - Reproductor Autónomo</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    
    <video id="pantalla" autoplay muted></video>

    <script>
        const URL_MOTOR = 'https://motor-dco-mexico.onrender.com/anuncio';
        const reproductor = document.getElementById('pantalla');

        // ==========================================
        // LA BÓVEDA (IndexedDB)
        // ==========================================
        let dbOffline; 
        const requestDB = indexedDB.open("MotorDCO_DB", 2); // Versión 2

        requestDB.onupgradeneeded = function(event) {
            dbOffline = event.target.result;
            if (dbOffline.objectStoreNames.contains('videos')) {
                dbOffline.deleteObjectStore('videos');
            }
            dbOffline.createObjectStore('videos', { keyPath: 'id' });
        };

        requestDB.onsuccess = function(event) {
            dbOffline = event.target.result;
            console.log("Bóveda lista y operativa.");
            cargarAnuncio(); 
        };

        requestDB.onerror = function(event) {
            console.error("Error en la bóveda:", event.target.error);
        };

        // ==========================================
        // MANTENIMIENTO EN SEGUNDO PLANO (TURNO DE DÍA)
        // ==========================================
        function rondaDeLimpiezaSilenciosa() {
            if (!dbOffline) return; 
            
            console.log("🧹 Conserje: Iniciando ronda de limpieza en segundo plano...");
            const transaction = dbOffline.transaction(['videos'], 'readwrite');
            const objectStore = transaction.objectStore('videos');
            const request = objectStore.getAll();

            request.onsuccess = function(event) {
                const videos = event.target.result;
                if (videos && videos.length > 0) {
                    const AHORA = Date.now();
                    let basuraEliminada = 0;

                    videos.forEach(video => {
                        if (AHORA > video.fechaCaducidad) {
                            objectStore.delete(video.id);
                            console.log(`🗑️ Eliminado en rutina: ${video.id}`);
                            basuraEliminada++;
                        }
                    });

                    if (basuraEliminada === 0) {
                        console.log("✨ Bóveda impecable. No hay basura que sacar.");
                    }
                }
            };
        }

        // Programado para limpiar cada 1 hora (3,600,000 ms) sin interrumpir la pantalla
        setInterval(rondaDeLimpiezaSilenciosa, 3600000);

        // ==========================================
        // FUNCIONES DE DESCARGA Y GUARDADO INTELIGENTE
        // ==========================================
        async function descargarYGuardarVideo(urlVideo, idVideo, fechaCaducidadCalculada) {
            try {
                console.log("Descargando video nuevo a la bóveda...");
                const response = await fetch(urlVideo);
                if (!response.ok) throw new Error('Error al descargar');
                
                const blob = await response.blob();
                const transaction = dbOffline.transaction(['videos'], 'readwrite');
                const objectStore = transaction.objectStore('videos');
                
                const request = objectStore.put({ 
                    id: idVideo, 
                    videoBlob: blob,
                    fechaCaducidad: fechaCaducidadCalculada 
                });
                
                request.onsuccess = function() {
                    console.log("Video asegurado. Reproduciendo...");
                    reproducirDesdeLocal(idVideo);
                };
            } catch (error) {
                console.error("Fallo al descargar. Activando emergencia.");
                activarBucleEmergencia();
            }
        }

        function renovarSelloDeVida(idVideo, nuevaFechaCaducidad) {
            const transaction = dbOffline.transaction(['videos'], 'readwrite');
            const objectStore = transaction.objectStore('videos');
            const request = objectStore.get(idVideo);

            request.onsuccess = function(event) {
                const videoData = event.target.result;
                if (videoData) {
                    videoData.fechaCaducidad = nuevaFechaCaducidad; 
                    objectStore.put(videoData); 
                }
            };
        }

        function reproducirDesdeLocal(idVideo) {
            const transaction = dbOffline.transaction(['videos'], 'readonly');
            const objectStore = transaction.objectStore('videos');
            const request = objectStore.get(idVideo);
            
            request.onsuccess = function(event) {
                const resultado = event.target.result;
                if (resultado) {
                    console.log(`Modo Músculo: Reproduciendo -> ${idVideo}`);
                    const videoURL = URL.createObjectURL(resultado.videoBlob);
                    reproductor.src = videoURL;
                    reproductor.play();
                } else {
                    activarBucleEmergencia();
                }
            };
        }

        // ==========================================
        // EL PLAN DE EMERGENCIA CONTRA APAGONES
        // ==========================================
        function activarBucleEmergencia() {
            console.warn("¡ALERTA ROJA! Sin red. Evaluando bóveda local...");
            const transaction = dbOffline.transaction(['videos'], 'readwrite'); 
            const objectStore = transaction.objectStore('videos');
            const request = objectStore.getAll(); 

            request.onsuccess = function(event) {
                const videos = event.target.result;
                
                if (videos && videos.length > 0) {
                    const AHORA = Date.now();
                    
                    const videosValidos = videos.filter(video => {
                        if (AHORA > video.fechaCaducidad) {
                            objectStore.delete(video.id); 
                            console.log(`Conserje (Apagón): Video caducado eliminado -> ${video.id}`);
                            return false; 
                        }
                        return true; 
                    });

                    if (videosValidos.length > 0) {
                        const indiceAleatorio = Math.floor(Math.random() * videosValidos.length);
                        const videoElegido = videosValidos[indiceAleatorio];

                        console.log("Bucle Activo: Proyectando backup válido.");
                        const videoURL = URL.createObjectURL(videoElegido.videoBlob);
                        reproductor.src = videoURL;
                        reproductor.play();
                    } else {
                         console.error("Conserje limpió todo. Bóveda vacía. Reintentando red...");
                         setTimeout(cargarAnuncio, 5000);
                    }
                } else {
                    console.error("Sin internet y bóveda vacía. Reintentando en 5s...");
                    setTimeout(cargarAnuncio, 5000);
                }
            };
        }

        // ==========================================
        // EL CEREBRO: CONTACTAR AL SERVIDOR Y LEER XML
        // ==========================================
        async function cargarAnuncio() {
            try {
                console.log("Contactando a la nave nodriza (Render)...");
                const respuesta = await fetch(URL_MOTOR);
                
                if (!respuesta.ok) throw new Error("Servidor no responde");

                const textoXML = await respuesta.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(textoXML, "text/xml");
                const mediaFile = xmlDoc.getElementsByTagName("MediaFile")[0];

                if (mediaFile) {
                    const videoUrl = mediaFile.textContent.trim();
                    const idVideo = videoUrl;

                    let fechaCalculada = null;
                    const posiblesEtiquetas = ["EndDate", "CampaignEndDate", "ExpirationDate", "Expiration"];
                    
                    for (let etiqueta of posiblesEtiquetas) {
                        const nodo = xmlDoc.getElementsByTagName(etiqueta)[0];
                        if (nodo && nodo.textContent.trim() !== "") {
                            const ms = new Date(nodo.textContent.trim()).getTime();
                            if (!isNaN(ms)) {
                                fechaCalculada = ms; 
                                console.log("¡Fecha de caducidad detectada en XML!");
                                break;
                            }
                        }
                    }

                    if (!fechaCalculada) {
                        fechaCalculada = Date.now() + (24 * 60 * 60 * 1000); // Regla de 24 horas
                        console.log("Sin fecha XML. Aplicando escudo estándar de 24 hrs.");
                    }

                    const transaction = dbOffline.transaction(['videos'], 'readonly');
                    const objectStore = transaction.objectStore('videos');
                    const request = objectStore.get(idVideo);

                    request.onsuccess = function(event) {
                        if (event.target.result) {
                            renovarSelloDeVida(idVideo, fechaCalculada);
                            reproducirDesdeLocal(idVideo);
                        } else {
                            descargarYGuardarVideo(videoUrl, idVideo, fechaCalculada);
                        }
                    };
                } else {
                    console.log("VAST vacío. Reintentando en 5s...");
                    setTimeout(cargarAnuncio, 5000);
                }
            } catch (error) {
                console.error("Error de conexión:", error);
                activarBucleEmergencia(); 
            }
        }

        // ==========================================
        // CICLO INFINITO Y ESTABILIDAD
        // ==========================================
        reproductor.addEventListener('ended', () => {
            URL.revokeObjectURL(reproductor.src); 
            cargarAnuncio(); 
        });

        reproductor.addEventListener('error', () => {
            console.error("El reproductor colapsó. Forzando reinicio del sistema...");
            setTimeout(() => location.reload(), 3000); 
        });

    </script>
</body>
</html>
